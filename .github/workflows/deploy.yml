name: Deploy to Railway

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy to Railway
      uses: railwayapp/deploy-action@v1
      with:
        token: ${{ secrets.RAILWAY_TOKEN }}
        service: arquitectura-de-sistemas-api
        environment: production
