{% extends "base.html" %}

{% block content %}
<div class="max-w-4xl space-y-6">
    <div class="bg-white p-6 rounded-lg shadow">
        <h1 class="text-2xl font-bold text-gray-800">Toma de Pedidos</h1>
        <p class="text-sm text-gray-600 mt-1">Selecciona una torta/producto y la cantidad para simular el pedido.</p>
    </div>

    <div class="bg-white p-6 rounded-lg shadow">
        {% if products %}
        <form
            """hx-post="/api/v1/orders/check""""
            hx-post="/ui/pos/check"
            hx-target="#order-check-result"
            hx-swap="innerHTML"
            class="grid gap-4 md:grid-cols-3 items-end"
        >
            <div class="md:col-span-2">
                <label for="product_id" class="block text-sm font-medium text-gray-700 mb-1">Producto/Torta</label>
                <select
                    id="product_id"
                    name="product_id"
                    required
                    class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-amber-500"
                >
                    {% for product in products %}
                    <option value="{{ product.id }}">{{ product.name }} - ${{ product.price }}</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label for="order_quantity" class="block text-sm font-medium text-gray-700 mb-1">Cantidad</label>
                <input
                    id="order_quantity"
                    name="order_quantity"
                    type="number"
                    min="1"
                    value="1"
                    required
                    class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-amber-500"
                >
            </div>

            <div class="md:col-span-3">
                <button
                    type="submit"
                    class="px-4 py-2 bg-amber-600 text-white rounded-md hover:bg-amber-700 font-medium"
                >
                    Verificar Pedido
                </button>
            </div>
        </form>
        {% else %}
        <p class="text-sm text-red-600">No hay productos creados. Crea un producto y su receta para poder simular pedidos.</p>
        {% endif %}
    </div>

    <div id="order-check-result"></div>
</div>
{% endblock %}
