<tr id="ingredient-row-{{ ingredient.id }}" class="border-b transition duration-200 
    {% if ingredient.stock_disponible < ingredient.stock_minimo %} bg-red-50 {% else %} hover:bg-gray-50 {% endif %}">
    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">{{ ingredient.name }}</td>
    <td class="px-6 py-4 whitespace-nowrap text-sm font-semibold 
        {% if ingredient.stock_disponible < ingredient.stock_minimo %} text-red-600 {% else %} text-gray-900 {% endif %}">
        {{ ingredient.stock_fisico }} {{ ingredient.unit.name if ingredient.unit else 'und' }}
    </td>
    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{ ingredient.stock_reservado }}</td>
    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{ ingredient.stock_minimo }}</td>
    <td class="px-6 py-4 whitespace-nowrap text-sm text-center text-gray-500">
        {% if ingredient.stock_disponible < ingredient.stock_minimo %}
            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-800">
                ¡Alerta: Stock Bajo!
            </span>
        {% else %}
            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">
                Óptimo
            </span>
        {% endif %}
    </td>
    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
        <!-- Formulario HTMX para ajuste de stock -->
        <form hx-post="/ui/inventory/{{ ingredient.id }}/adjust" 
              hx-target="#ingredient-row-{{ ingredient.id }}" 
              hx-swap="outerHTML" 
              class="flex items-center space-x-2">
            <input type="number" name="amount" placeholder="+/-" required
                   class="w-16 px-2 py-1 border border-gray-300 rounded text-sm focus:outline-none focus:ring-1 focus:ring-amber-500">
            <input type="text" name="reason" placeholder="Motivo (ej: ingreso)" value="Ajuste manual" 
                   class="w-32 px-2 py-1 border border-gray-300 rounded text-sm focus:outline-none focus:ring-1 focus:ring-amber-500">
            <button type="submit" class="px-3 py-1 bg-amber-600 text-white rounded hover:bg-amber-700 focus:outline-none text-sm font-medium">
                Ajustar
            </button>
        </form>
    </td>
</tr>
